<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bakehouse Admin</title>
    <link rel="stylesheet" href="/css/style.css">
    <style>
        :root {
            --admin-primary: #8b4513;
            --admin-primary-light: #b5651d;
            --admin-bg: #f5f5f5;
            --admin-card: #fff;
            --admin-text: #333;
            --admin-text-light: #666;
            --admin-border: #e0e0e0;
            --admin-success: #2d8b46;
            --admin-warning: #e67e22;
            --admin-danger: #c0392b;
            --admin-info: #2980b9;
        }
        body { background: var(--admin-bg); }
        .admin-container { max-width: 1200px; margin: 0 auto; padding: 1.5rem; }

        /* Stats */
        .stats { display: flex !important; flex-direction: row; flex-wrap: nowrap; gap: 1rem; margin-bottom: 2rem; }
        .stat-card { flex: 1; min-width: 0; background: var(--admin-card); border-radius: 8px; padding: 1.25rem; box-shadow: 0 1px 4px rgba(0,0,0,0.08); }
        .stat-card .label { font-size: 0.8rem; color: var(--admin-text-light); text-transform: uppercase; letter-spacing: 0.05em; }
        .stat-card .value { font-size: 1.8rem; font-weight: 700; color: var(--admin-primary); margin-top: 0.25rem; }

        /* Tabs */
        .tabs { display: flex; gap: 0; margin-bottom: 1.5rem; border-bottom: 2px solid var(--admin-border); }
        .tab { padding: 0.75rem 1.5rem; cursor: pointer; font-weight: 600; color: var(--admin-text-light); border-bottom: 2px solid transparent; margin-bottom: -2px; transition: all 0.2s; }
        .tab:hover { color: var(--admin-primary); }
        .tab.active { color: var(--admin-primary); border-bottom-color: var(--admin-primary); }

        /* Tables */
        .panel { display: none; }
        .panel.active { display: block; }
        table { width: 100%; border-collapse: collapse; background: var(--admin-card); border-radius: 8px; overflow: hidden; box-shadow: 0 1px 4px rgba(0,0,0,0.08); }
        th { background: var(--admin-bg); font-size: 0.8rem; text-transform: uppercase; letter-spacing: 0.05em; color: var(--admin-text-light); text-align: left; padding: 0.75rem 1rem; }
        td { padding: 0.75rem 1rem; border-top: 1px solid var(--admin-border); font-size: 0.9rem; }
        tr:hover td { background: #fafafa; }

        /* Status badges */
        .status-badge { display: inline-block; padding: 0.2rem 0.6rem; border-radius: 12px; font-size: 0.75rem; font-weight: 600; text-transform: capitalize; }
        .status-pending { background: #fff3cd; color: #856404; }
        .status-ready_to_ship { background: #cce5ff; color: #004085; }
        .status-shipped { background: #d4edda; color: #155724; }
        .status-delivered { background: #d4edda; color: var(--admin-success); }
        .status-cancelled { background: #f8d7da; color: var(--admin-danger); }

        .edit-btn { padding: 0.3rem 0.7rem; background: var(--admin-primary); color: #fff; border: none; border-radius: 4px; font-size: 0.75rem; font-weight: 600; cursor: pointer; }
        .edit-btn:hover { background: var(--admin-primary-light); }

        /* Modal */
        .modal-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.4); z-index: 1000; align-items: center; justify-content: center; }
        .modal-overlay.open { display: flex; }
        .modal { background: #fff; border-radius: 10px; padding: 1.75rem; width: 100%; max-width: 420px; box-shadow: 0 8px 30px rgba(0,0,0,0.2); }
        .modal h3 { margin-bottom: 1rem; color: var(--admin-primary); }
        .modal label { display: block; font-size: 0.8rem; font-weight: 600; color: var(--admin-text-light); margin-bottom: 0.25rem; text-transform: uppercase; letter-spacing: 0.03em; }
        .modal select, .modal input[type=text] { width: 100%; padding: 0.5rem 0.6rem; border: 1px solid var(--admin-border); border-radius: 4px; font-size: 0.9rem; margin-bottom: 1rem; }
        .modal-actions { display: flex; gap: 0.75rem; justify-content: flex-end; margin-top: 0.5rem; }
        .modal-actions button { padding: 0.5rem 1.25rem; border: none; border-radius: 5px; font-size: 0.85rem; font-weight: 600; cursor: pointer; }
        .modal-save { background: var(--admin-primary); color: #fff; }
        .modal-save:hover { background: var(--admin-primary-light); }
        .modal-cancel { background: var(--admin-border); color: var(--admin-text); }
        .modal-cancel:hover { background: #ccc; }

        /* Items list */
        .order-items { font-size: 0.8rem; color: var(--admin-text-light); }
        .order-items span { display: block; }

        .verified-yes { color: var(--admin-success); }
        .verified-no { color: var(--admin-danger); }

        .empty { text-align: center; padding: 3rem; color: var(--admin-text-light); }

        @media (max-width: 768px) {
            table { font-size: 0.8rem; }
            td, th { padding: 0.5rem; }
        }
    </style>
</head>
<body>
    <header>
        <nav class="navbar navbar-centered">
            <a href="/" class="logo"><img src="/images/logo/bakehouse_logo.jpg" alt="Bakehouse"></a>
            <ul class="nav-links">
                <li><a href="/">Home</a></li>
                <li><a href="/products.html">Products</a></li>
                <li><a href="/cart.html" class="cart-link">Cart</a></li>
                <li><a href="/admin/" class="active">Admin</a></li>
                <li id="auth-nav"></li>
            </ul>
        </nav>
    </header>

    <div class="admin-container">
        <!-- Stats -->
        <div class="stats" id="stats"></div>

        <!-- Tabs -->
        <div class="tabs">
            <div class="tab active" data-tab="orders">Orders</div>
            <div class="tab" data-tab="users">Users</div>
            <div class="tab" data-tab="products">Products</div>
        </div>

        <!-- Panels -->
        <div class="panel active" id="panel-orders"></div>
        <div class="panel" id="panel-users"></div>
        <div class="panel" id="panel-products"></div>
    </div>

    <!-- Edit Order Modal -->
    <div class="modal-overlay" id="edit-modal">
        <div class="modal">
            <h3>Edit Order #<span id="edit-order-id"></span></h3>
            <div id="edit-error" style="display:none; background:#f8d7da; color:#721c24; padding:0.5rem 0.75rem; border-radius:4px; font-size:0.85rem; margin-bottom:1rem;"></div>
            <label for="edit-status">Status</label>
            <select id="edit-status">
                <option value="pending">Pending</option>
                <option value="ready_to_ship">Ready to Ship</option>
                <option value="shipped">Shipped</option>
                <option value="delivered">Delivered</option>
                <option value="cancelled">Cancelled</option>
            </select>
            <label for="edit-tracking">Tracking Number <span id="tracking-required" style="color:var(--admin-danger); display:none;">*</span></label>
            <input type="text" id="edit-tracking" placeholder="Enter tracking number">
            <label for="edit-carrier">Carrier <span id="carrier-required" style="color:var(--admin-danger); display:none;">*</span></label>
            <input type="text" id="edit-carrier" placeholder="e.g. UPS, FedEx, USPS">
            <div class="modal-actions">
                <button class="modal-cancel" onclick="closeEditModal()">Cancel</button>
                <button class="modal-save" onclick="saveEdit()">Save</button>
            </div>
        </div>
    </div>

    <script>
        // Tabs
        document.querySelectorAll('.tab').forEach(tab => {
            tab.addEventListener('click', () => {
                document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
                document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
                tab.classList.add('active');
                document.getElementById('panel-' + tab.dataset.tab).classList.add('active');
            });
        });

        function esc(str) {
            const d = document.createElement('div');
            d.textContent = str;
            return d.innerHTML;
        }

        // Load stats
        async function loadStats() {
            const res = await fetch('/api/admin/stats');
            const s = await res.json();
            document.getElementById('stats').innerHTML = `
                <div class="stat-card"><div class="label">Total Orders</div><div class="value">${s.totalOrders}</div></div>
                <div class="stat-card"><div class="label">Pending Orders</div><div class="value">${s.pendingOrders}</div></div>
                <div class="stat-card"><div class="label">Revenue</div><div class="value">$${s.totalRevenue.toFixed(2)}</div></div>
                <div class="stat-card"><div class="label">Users</div><div class="value">${s.totalUsers}</div></div>
            `;
        }

        // Load orders
        async function loadOrders() {
            const res = await fetch('/api/admin/orders');
            const orders = await res.json();
            const panel = document.getElementById('panel-orders');

            if (orders.length === 0) {
                panel.innerHTML = '<div class="empty">No orders yet.</div>';
                return;
            }

            panel.innerHTML = `<table>
                <thead><tr><th>ID</th><th>Customer</th><th>Email</th><th>Phone</th><th>Address</th><th>Items</th><th>Total</th><th>Status</th><th>Tracking #</th><th>Carrier</th><th>Date</th><th></th></tr></thead>
                <tbody>${orders.map(o => {
                    const statusLabel = o.status === 'ready_to_ship' ? 'Ready to Ship' : o.status;
                    return `
                    <tr>
                        <td>#${o.id}</td>
                        <td>${esc(o.customer_name)}</td>
                        <td>${esc(o.customer_email)}</td>
                        <td>${o.customer_phone ? esc(o.customer_phone) : '—'}</td>
                        <td>${esc(o.shipping_address)}, ${esc(o.shipping_city)} ${esc(o.shipping_zip)}</td>
                        <td class="order-items">${o.items.map(i => `<span>${esc(i.name)} × ${i.quantity}</span>`).join('')}</td>
                        <td><strong>$${o.total.toFixed(2)}</strong></td>
                        <td><span class="status-badge status-${o.status}">${statusLabel}</span></td>
                        <td>${o.tracking_number ? esc(o.tracking_number) : '—'}</td>
                        <td>${o.carrier ? esc(o.carrier) : '—'}</td>
                        <td>${new Date(o.created_at).toLocaleDateString()}</td>
                        <td><button class="edit-btn" onclick="openEditModal(${o.id}, '${o.status}', '${esc(o.tracking_number || '')}', '${esc(o.carrier || '')}')">Edit</button></td>
                    </tr>`;
                }).join('')}</tbody>
            </table>`;
        }

        // Edit modal
        let editOrderId = null;
        let editOriginalStatus = null;

        // Define which statuses are allowed from each current status
        const allowedTransitions = {
            pending:       ['pending', 'ready_to_ship', 'shipped', 'cancelled'],
            ready_to_ship: ['ready_to_ship', 'shipped', 'cancelled'],
            shipped:       ['shipped', 'delivered'],
            delivered:     ['delivered'],
            cancelled:     ['cancelled'],
        };

        const statusLabels = {
            pending: 'Pending',
            ready_to_ship: 'Ready to Ship',
            shipped: 'Shipped',
            delivered: 'Delivered',
            cancelled: 'Cancelled',
        };

        function updateRequiredIndicators() {
            const status = document.getElementById('edit-status').value;
            const show = status === 'shipped';
            document.getElementById('tracking-required').style.display = show ? 'inline' : 'none';
            document.getElementById('carrier-required').style.display = show ? 'inline' : 'none';
        }

        function openEditModal(id, status, tracking, carrier) {
            editOrderId = id;
            editOriginalStatus = status;
            document.getElementById('edit-order-id').textContent = id;
            document.getElementById('edit-tracking').value = tracking;
            document.getElementById('edit-carrier').value = carrier;
            document.getElementById('edit-error').style.display = 'none';

            // Populate status dropdown with only allowed transitions
            const select = document.getElementById('edit-status');
            const allowed = allowedTransitions[status] || [status];
            select.innerHTML = allowed.map(s => `<option value="${s}">${statusLabels[s] || s}</option>`).join('');
            select.value = status;

            updateRequiredIndicators();
            document.getElementById('edit-modal').classList.add('open');
        }

        // Update required indicators when status changes
        document.getElementById('edit-status').addEventListener('change', updateRequiredIndicators);

        function closeEditModal() {
            document.getElementById('edit-modal').classList.remove('open');
            editOrderId = null;
            editOriginalStatus = null;
        }

        async function saveEdit() {
            const status = document.getElementById('edit-status').value;
            const tracking_number = document.getElementById('edit-tracking').value.trim();
            const carrier = document.getElementById('edit-carrier').value.trim();
            const errorDiv = document.getElementById('edit-error');
            errorDiv.style.display = 'none';

            // Client-side validation
            if (status === 'shipped' && (!tracking_number || !carrier)) {
                errorDiv.textContent = 'Tracking number and carrier are required when shipping an order.';
                errorDiv.style.display = 'block';
                return;
            }

            try {
                const res = await fetch('/api/admin/orders/' + editOrderId + '/status', {
                    method: 'PATCH',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ status, tracking_number, carrier }),
                });
                const data = await res.json();

                if (!res.ok) {
                    errorDiv.textContent = data.error || 'Failed to update order.';
                    errorDiv.style.display = 'block';
                    return;
                }

                closeEditModal();
                loadStats();
                loadOrders();
            } catch (err) {
                errorDiv.textContent = 'Something went wrong. Please try again.';
                errorDiv.style.display = 'block';
            }
        }

        // Load users
        async function loadUsers() {
            const res = await fetch('/api/admin/users');
            const users = await res.json();
            const panel = document.getElementById('panel-users');

            if (users.length === 0) {
                panel.innerHTML = '<div class="empty">No users yet.</div>';
                return;
            }

            panel.innerHTML = `<table>
                <thead><tr><th>ID</th><th>Name</th><th>Email</th><th>Provider</th><th>Verified</th><th>Joined</th></tr></thead>
                <tbody>${users.map(u => `
                    <tr>
                        <td>${u.id}</td>
                        <td>${esc(u.name || '—')}</td>
                        <td>${esc(u.email)}</td>
                        <td>${esc(u.provider)}</td>
                        <td class="${u.verified ? 'verified-yes' : 'verified-no'}">${u.verified ? 'Yes' : 'No'}</td>
                        <td>${new Date(u.created_at).toLocaleDateString()}</td>
                    </tr>
                `).join('')}</tbody>
            </table>`;
        }

        // Load products
        async function loadProducts() {
            const res = await fetch('/api/admin/products');
            const products = await res.json();
            const panel = document.getElementById('panel-products');

            panel.innerHTML = `<table>
                <thead><tr><th>ID</th><th>Name</th><th>Category</th><th>Price</th><th>Stock</th><th>Featured</th></tr></thead>
                <tbody>${products.map(p => `
                    <tr>
                        <td>${p.id}</td>
                        <td>${esc(p.name)}</td>
                        <td>${esc(p.category_name || '—')}</td>
                        <td>$${p.price.toFixed(2)}</td>
                        <td>${p.stock}</td>
                        <td>${p.featured ? '⭐' : '—'}</td>
                    </tr>
                `).join('')}</tbody>
            </table>`;
        }

        // Init
        loadStats();
        loadOrders();
        loadUsers();
        loadProducts();
    </script>
    <script src="/js/auth-nav.js"></script>
</body>
</html>
