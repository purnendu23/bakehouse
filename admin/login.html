<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Login — Bakehouse</title>
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: #f5f5f5; color: #333; display: flex; align-items: center; justify-content: center; min-height: 100vh; }
        .card { background: #fff; border-radius: 12px; box-shadow: 0 2px 12px rgba(0,0,0,0.1); padding: 2.5rem; width: 100%; max-width: 380px; }
        .card img { display: block; margin: 0 auto 1rem; height: 50px; }
        .card h1 { text-align: center; font-size: 1.2rem; color: #8b4513; margin-bottom: 1.5rem; }
        label { display: block; font-size: 0.85rem; font-weight: 600; margin-bottom: 0.3rem; color: #555; }
        input { width: 100%; padding: 0.65rem 0.75rem; border: 1px solid #ddd; border-radius: 6px; font-size: 0.95rem; margin-bottom: 1rem; }
        input:focus { outline: none; border-color: #8b4513; box-shadow: 0 0 0 2px rgba(139,69,19,0.15); }
        button { width: 100%; padding: 0.75rem; background: #8b4513; color: #fff; border: none; border-radius: 6px; font-size: 1rem; font-weight: 600; cursor: pointer; }
        button:hover { background: #6d350f; }
        .error { color: #c0392b; font-size: 0.85rem; text-align: center; margin-bottom: 1rem; display: none; }
    </style>
</head>
<body>
    <div class="card">
        <img src="/images/logo/bakehouse_logo.jpg" alt="Bakehouse">
        <h1>Admin Login</h1>
        <div class="error" id="error"></div>
        <form id="login-form">
            <label for="email">Email</label>
            <input type="email" id="email" name="email" required autocomplete="email">
            <label for="password">Password</label>
            <input type="password" id="password" name="password" required autocomplete="current-password">
            <button type="submit">Sign In</button>
        </form>
    </div>
    <script>
        document.getElementById('login-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const errEl = document.getElementById('error');
            errEl.style.display = 'none';

            const res = await fetch('/api/auth/login', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    email: document.getElementById('email').value,
                    password: document.getElementById('password').value,
                }),
            });

            const data = await res.json();
            if (!res.ok) {
                errEl.textContent = data.error || 'Login failed.';
                errEl.style.display = 'block';
                return;
            }

            // Check if user is admin
            const me = await fetch('/api/auth/me');
            const user = await me.json();
            if (!user.is_admin) {
                // Not admin — log them back out and show error
                await fetch('/api/auth/logout', { method: 'POST' });
                errEl.textContent = 'Access denied. Admin privileges required.';
                errEl.style.display = 'block';
                return;
            }

            window.location.href = '/admin/';
        });
    </script>
</body>
</html>
