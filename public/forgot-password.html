<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Forgot Password — Bakehouse</title>
    <link rel="stylesheet" href="/css/style.css">
</head>
<body>
    <header>
        <nav class="navbar navbar-centered">
            <a href="/" class="logo"><img src="/images/logo/bakehouse_logo.jpg" alt="Bakehouse"></a>
            <ul class="nav-links">
                <li><a href="/">Home</a></li>
                <li><a href="/products.html">Products</a></li>
                <li><a href="/cart.html" class="cart-link">Cart <span id="cart-count" class="badge">0</span></a></li>
            </ul>
        </nav>
    </header>

    <main>
        <section class="section">
            <div class="container">
                <div class="auth-container">
                    <h2 class="auth-title">Reset Password</h2>
                    <p class="auth-subtitle">Enter your email and we'll send you a reset link</p>

                    <div id="auth-error" class="auth-error" style="display:none;"></div>

                    <form id="forgot-form" class="auth-form">
                        <div class="form-group">
                            <label for="email">Email</label>
                            <input type="email" id="email" name="email" required placeholder="you@example.com">
                        </div>
                        <button type="submit" class="btn btn-primary btn-block">Send Reset Link</button>
                    </form>

                    <p class="auth-switch">Remember your password? <a href="/login.html">Log in</a></p>
                </div>
            </div>
        </section>
    </main>

    <footer>
        <div class="container">
            <p>&copy; 2026 Bakehouse. All rights reserved.</p>
        </div>
    </footer>

    <script src="/js/cart.js"></script>
    <script>
        const form = document.getElementById('forgot-form');
        const errorDiv = document.getElementById('auth-error');

        form.addEventListener('submit', async (e) => {
            e.preventDefault();
            errorDiv.style.display = 'none';

            const email = document.getElementById('email').value;

            try {
                const res = await fetch('/api/auth/forgot-password', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email }),
                });
                const data = await res.json();

                if (!res.ok) {
                    errorDiv.textContent = data.error || 'Something went wrong.';
                    errorDiv.style.display = 'block';
                    return;
                }

                // Show success message
                document.querySelector('.auth-container').innerHTML = `
                    <div style="text-align: center;">
                        <div style="font-size: 3rem; margin-bottom: 1rem;">🔑</div>
                        <h2 class="auth-title">Check Your Terminal</h2>
                        <p style="color: var(--color-text-light); margin: 1rem 0;">
                            If an account exists for <strong>${email}</strong>, a password reset link has been generated.<br>
                            Check the server terminal for the reset link.
                        </p>
                        <a href="/login.html" class="btn btn-outline" style="margin-top: 1rem;">Back to Login</a>
                    </div>
                `;
            } catch (err) {
                errorDiv.textContent = 'Something went wrong. Please try again.';
                errorDiv.style.display = 'block';
            }
        });
    </script>
</body>
</html>
