<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reset Password — Bakehouse</title>
    <link rel="stylesheet" href="/css/style.css">
</head>
<body>
    <header>
        <nav class="navbar navbar-centered">
            <a href="/" class="logo"><img src="/images/logo/bakehouse_logo.jpg" alt="Bakehouse"></a>
            <ul class="nav-links">
                <li><a href="/">Home</a></li>
                <li><a href="/products.html">Products</a></li>
                <li><a href="/cart.html" class="cart-link">Cart <span id="cart-count" class="badge">0</span></a></li>
            </ul>
        </nav>
    </header>

    <main>
        <section class="section">
            <div class="container">
                <div class="auth-container">
                    <div id="reset-content">
                        <h2 class="auth-title">Set New Password</h2>
                        <p class="auth-subtitle">Enter your new password below</p>

                        <div id="auth-error" class="auth-error" style="display:none;"></div>

                        <form id="reset-form" class="auth-form">
                            <div class="form-group">
                                <label for="password">New Password</label>
                                <input type="password" id="password" name="password" required minlength="8" placeholder="At least 8 characters">
                            </div>
                            <div class="form-group">
                                <label for="confirm-password">Confirm Password</label>
                                <input type="password" id="confirm-password" name="confirm-password" required minlength="8" placeholder="Repeat your password">
                            </div>
                            <button type="submit" class="btn btn-primary btn-block">Reset Password</button>
                        </form>
                    </div>
                </div>
            </div>
        </section>
    </main>

    <footer>
        <div class="container">
            <p>&copy; 2026 Bakehouse. All rights reserved.</p>
        </div>
    </footer>

    <script src="/js/cart.js"></script>
    <script>
        const params = new URLSearchParams(window.location.search);
        const token = params.get('token');
        const content = document.getElementById('reset-content');

        if (!token) {
            content.innerHTML = `
                <div style="text-align: center;">
                    <div style="font-size: 3rem; margin-bottom: 1rem;">❌</div>
                    <h2 class="auth-title">Invalid Link</h2>
                    <p style="color: var(--color-text-light); margin: 1rem 0;">This password reset link is missing or invalid.</p>
                    <a href="/forgot-password.html" class="btn btn-outline">Request New Link</a>
                </div>
            `;
        } else {
            const form = document.getElementById('reset-form');
            const errorDiv = document.getElementById('auth-error');

            form.addEventListener('submit', async (e) => {
                e.preventDefault();
                errorDiv.style.display = 'none';

                const password = document.getElementById('password').value;
                const confirmPassword = document.getElementById('confirm-password').value;

                if (password !== confirmPassword) {
                    errorDiv.textContent = 'Passwords do not match.';
                    errorDiv.style.display = 'block';
                    return;
                }

                try {
                    const res = await fetch('/api/auth/reset-password', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ token, password }),
                    });
                    const data = await res.json();

                    if (!res.ok) {
                        errorDiv.textContent = data.error || 'Reset failed.';
                        errorDiv.style.display = 'block';
                        return;
                    }

                    // Show success message
                    content.innerHTML = `
                        <div style="text-align: center;">
                            <div style="font-size: 3rem; margin-bottom: 1rem;">✅</div>
                            <h2 class="auth-title">Password Reset!</h2>
                            <p style="color: var(--color-text-light); margin: 1rem 0;">
                                Your password has been updated successfully.<br>
                                You can now log in with your new password.
                            </p>
                            <a href="/login.html" class="btn btn-primary" style="margin-top: 1rem;">Log In</a>
                        </div>
                    `;
                } catch (err) {
                    errorDiv.textContent = 'Something went wrong. Please try again.';
                    errorDiv.style.display = 'block';
                }
            });
        }
    </script>
</body>
</html>
