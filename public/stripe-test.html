<!DOCTYPE html>
<html>
<head>
    <title>Stripe Test</title>
    <script src="https://js.stripe.com/v3/"></script>
    <style>
        #card-element {
            padding: 12px;
            border: 2px solid #333;
            border-radius: 4px;
            background: #fff;
            min-height: 44px;
        }
        #result { margin-top: 1rem; font-family: monospace; white-space: pre-wrap; }
    </style>
</head>
<body>
    <h2>Stripe Card Element Test</h2>
    <div id="result">Loading...</div>
    <br>
    <label>Card Details:</label>
    <div id="card-element"></div>
    <script>
        (async function() {
            const log = (msg) => {
                document.getElementById('result').textContent += '\n' + msg;
                console.log(msg);
            };
            document.getElementById('result').textContent = '';

            // 1. Check Stripe.js loaded
            log('Stripe.js loaded: ' + (typeof Stripe !== 'undefined'));

            // 2. Fetch config
            try {
                const res = await fetch('/api/payments/config');
                const config = await res.json();
                log('Public key: ' + (config.stripePublicKey ? config.stripePublicKey.substring(0, 20) + '...' : 'MISSING'));

                if (!config.stripePublicKey) {
                    log('ERROR: No Stripe public key!');
                    return;
                }

                // 3. Init Stripe
                const stripe = Stripe(config.stripePublicKey);
                log('Stripe initialized: OK');

                // 4. Create and mount element
                const elements = stripe.elements();
                const card = elements.create('card', {
                    style: { base: { fontSize: '18px', color: '#333' } }
                });
                card.mount('#card-element');
                log('Card element mounted: OK');

                card.on('ready', () => log('Card element READY (iframe loaded)'));
                card.on('change', (e) => log('Change: ' + JSON.stringify(e.error || 'valid')));
            } catch(err) {
                log('ERROR: ' + err.message);
            }
        })();
    </script>
</body>
</html>
