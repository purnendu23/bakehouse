<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Checkout — Bakehouse</title>
    <link rel="stylesheet" href="/css/style.css">
</head>
<body>
    <header>
        <nav class="navbar">
            <a href="/" class="logo">🍞 Bakehouse</a>
            <ul class="nav-links">
                <li><a href="/">Home</a></li>
                <li><a href="/products.html">Products</a></li>
                <li><a href="/cart.html" class="cart-link">Cart <span id="cart-count" class="badge">0</span></a></li>
            </ul>
        </nav>
    </header>

    <main>
        <section class="section">
            <div class="container">
                <h1 class="page-title">Checkout</h1>

                <div id="checkout-form-wrapper">
                    <form id="checkout-form" class="checkout-form" novalidate>
                        <h2>Shipping Information</h2>
                        <div class="form-row">
                            <div class="form-group">
                                <label for="customer_name">Full Name *</label>
                                <input type="text" id="customer_name" name="customer_name" required>
                            </div>
                            <div class="form-group">
                                <label for="customer_email">Email *</label>
                                <input type="email" id="customer_email" name="customer_email" required>
                            </div>
                        </div>
                        <div class="form-row">
                            <div class="form-group">
                                <label for="customer_phone">Phone</label>
                                <input type="tel" id="customer_phone" name="customer_phone">
                            </div>
                        </div>
                        <div class="form-group">
                            <label for="shipping_address">Address *</label>
                            <input type="text" id="shipping_address" name="shipping_address" required>
                        </div>
                        <div class="form-row">
                            <div class="form-group">
                                <label for="shipping_city">City *</label>
                                <input type="text" id="shipping_city" name="shipping_city" required>
                            </div>
                            <div class="form-group">
                                <label for="shipping_zip">ZIP Code *</label>
                                <input type="text" id="shipping_zip" name="shipping_zip" required>
                            </div>
                        </div>

                        <h2>Order Summary</h2>
                        <div id="checkout-items"></div>
                        <div class="cart-total">
                            Total: <strong>$<span id="checkout-total">0.00</span></strong>
                        </div>

                        <div id="checkout-error" class="error-msg" style="display:none;"></div>

                        <button type="submit" class="btn btn-primary btn-lg" style="width:100%;margin-top:1rem;">
                            Place Order
                        </button>
                    </form>
                </div>

                <div id="order-confirmation" style="display:none;" class="confirmation">
                    <div class="confirmation-icon">✅</div>
                    <h2>Thank You for Your Order!</h2>
                    <p>Your order <strong>#<span id="confirm-order-id"></span></strong> has been placed.</p>
                    <p>Total: <strong>$<span id="confirm-total"></span></strong></p>
                    <a href="/products.html" class="btn btn-primary">Continue Shopping</a>
                </div>
            </div>
        </section>
    </main>

    <footer>
        <div class="container">
            <p>&copy; 2026 Bakehouse. All rights reserved.</p>
        </div>
    </footer>

    <script src="/js/cart.js"></script>
    <script src="/js/checkout.js"></script>
</body>
</html>
