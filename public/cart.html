<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cart — Bakehouse</title>
    <link rel="stylesheet" href="/css/style.css">
</head>
<body>
    <header>
        <nav class="navbar">
            <a href="/" class="logo"><img src="/images/logo/bakehouse_logo.jpg" alt="Bakehouse"></a>
            <ul class="nav-links">
                <li><a href="/">Home</a></li>
                <li><a href="/products.html">Products</a></li>
                <li><a href="/cart.html" class="cart-link active">Cart <span id="cart-count" class="badge">0</span></a></li>
                <li id="auth-nav"></li>
            </ul>
        </nav>
    </header>

    <main>
        <section class="section">
            <div class="container">
                <h1 class="page-title">Your Cart</h1>
                <div id="cart-contents">
                    <!-- Filled by JS -->
                </div>
                <div id="cart-summary" class="cart-summary" style="display:none;">
                    <div class="cart-total">
                        Total: <strong>$<span id="cart-total">0.00</span></strong>
                    </div>
                    <a href="/checkout.html" class="btn btn-primary btn-lg">Proceed to Checkout</a>
                </div>
            </div>
        </section>
    </main>

    <footer>
        <div class="container">
            <p>&copy; 2026 Bakehouse. All rights reserved.</p>
        </div>
    </footer>

    <script src="/js/cart.js"></script>
    <script src="/js/auth-nav.js"></script>
    <script src="/js/cart-page.js"></script>
</body>
</html>
